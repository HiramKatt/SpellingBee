</div>

</p>

<div style="text-align:center;">

<button class="btnShow" onclick="toggleWord()">

🔊 Pronunciar

</p>

class="card"
style="display:none;">

<h2>🏆 Resultados Finales</h2>

<p>Total contestadas:
<span id="totalFinal"></span></p>

<p>Aciertos:
<span id="correctFinal"></span></p>

<p>Errores:
<span id="wrongFinal"></span></p>

<p>Porcentaje:
<span id="percentFinal"></span>%</p>

<h3>Palabras falladas</h3>

<ul id="wrongWords"></ul>

<button
class="btnPractice"
onclick="practiceMistakes()">

🔁 Practicar palabras falladas

</button>

</div>

<script>

let words=[];
let remainingWords=[];
let currentWord="";

let correct=0;
let wrong=0;

let wrongList=[];

let totalWords=0;
let currentIndex=0;

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=
[array[j],array[i]];

}

}

function startGame(){

const text=
document.getElementById("wordList").value;

words=text
.split("\n")
.map(w=>w.trim())
.filter(w=>w.length>0);

if(words.length===0){

alert("Agrega palabras.");

return;

}

remainingWords=[...words];

shuffle(remainingWords);

correct=0;
wrong=0;

wrongList=[];

totalWords=words.length;
currentIndex=0;

document.getElementById("totalWords")
.textContent=totalWords;

document.getElementById("gameArea")
.style.display="block";

document.getElementById("results")
.style.display="none";

updateCounters();

nextWord();

}

function nextWord(){

if(remainingWords.length===0){

finishGame();

return;

}

currentWord=remainingWords.pop();

currentIndex++;

document.getElementById("word")
.textContent=currentWord;

document.getElementById("word")
.classList.add("hidden");

updateCounters();

updateProgress();

speakWord();

}

function speakWord(){

if(!currentWord) return;

speechSynthesis.cancel();

let speech=
new SpeechSynthesisUtterance(currentWord);

speech.lang="en-US";

speech.rate=0.8;

speechSynthesis.speak(speech);

}

function toggleWord(){

document
.getElementById("word")
.classList
.toggle("hidden");

}

function startListening(){

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){

alert("Este navegador no soporta reconocimiento de voz.");

return;

}

const recognition =
new SpeechRecognition();

recognition.lang = "en-US";
recognition.interimResults = false;
recognition.maxAlternatives = 1;

document.getElementById("heardText")
.textContent = "🎤 Escuchando...";

recognition.start();

recognition.onresult = function(event){

let spoken =
event.results[0][0].transcript;

document.getElementById("heardText")
.textContent =
"Escuché: " + spoken;

let answer =
spoken
.toLowerCase()
.replace(/space/g,"")
.replace(/\s+/g,"")
.trim();

let correctAnswer =
currentWord
.toLowerCase()
.replace(/\s+/g,"")
.trim();



if(answer === correctAnswer){

    document.getElementById("heardText")
    .textContent += " ✅ Correcto";

    correct++;

    updateCounters();

    setTimeout(()=>{
        nextWord();
    },1000);

}else{

    document.getElementById("heardText")
    .textContent += " ❌ Incorrecto";

    wrong++;

    if(!wrongList.includes(currentWord)){
        wrongList.push(currentWord);
    }

    updateCounters();

    setTimeout(()=>{
        nextWord();
    },1500);

}

};

recognition.onerror = function(event){

document.getElementById("heardText")
.textContent =
"❌ Error: " + event.error;

};
}

function markCorrect(){

    correct++;

    updateCounters();

    nextWord();

}

function markWrong(){

    wrong++;

    if(!wrongList.includes(currentWord)){
        wrongList.push(currentWord);
    }

    updateCounters();

    nextWord();

}


function updateCounters(){

document.getElementById("correct")
.textContent=correct;

document.getElementById("wrong")
.textContent=wrong;

document.getElementById("remaining")
.textContent=
remainingWords.length;

document.getElementById("currentNum")
.textContent=currentIndex;

}

function updateProgress(){

let percent=
(currentIndex/totalWords)*100;

document.getElementById("progressBar")
.style.width=
percent+"%";

}

function finishGame(){

document.getElementById("results")
.style.display="block";

let total=
correct+wrong;

let percent=0;

if(total>0){

percent=
((correct/total)*100)
.toFixed(1);

}

document.getElementById("totalFinal")
.textContent=total;

document.getElementById("correctFinal")
.textContent=correct;

document.getElementById("wrongFinal")
.textContent=wrong;

document.getElementById("percentFinal")
.textContent=percent;

const list=
document.getElementById("wrongWords");

list.innerHTML="";

wrongList.forEach(word=>{

const li=
document.createElement("li");

li.textContent=word;

list.appendChild(li);

});

alert("🎉 ¡Terminó la práctica!");

}

function practiceMistakes(){

if(wrongList.length===0){

alert("No hay palabras falladas.");

return;

}

document.getElementById("wordList")
.value=
wrongList.join("\n");

startGame();

}

</script>
